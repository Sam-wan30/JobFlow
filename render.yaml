services:
  # Backend Service
  - type: web
    name: jobflow-backend
    runtime: node
    plan: free
    env: node
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: jobflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: jobflow-frontend
          property: url
      - key: GOOGLE_CALLBACK_URL
        fromService:
          type: web
          name: jobflow-backend
          property: url
          suffix: /api/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_SERVICE
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false

  # Frontend Service
  - type: web
    name: jobflow-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: jobflow-backend
          property: url

# PostgreSQL Database
databases:
  - name: jobflow-db
    databaseName: jobflow
    user: jobflow_user
    plan: free
    region: oregon
